<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<style>
/* 가로모드 강제 안내 */
#rotate-msg{display:none;position:fixed;inset:0;z-index:9999;background:#1a1a2e;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:'Noto Sans KR',sans-serif;}
#rotate-msg .rm-ico{width:56px;height:56px;animation:spin .9s infinite alternate;}
#rotate-msg p{font-size:16px;font-weight:700;color:#00d4aa;}
@keyframes spin{from{transform:rotate(-20deg);}to{transform:rotate(20deg);}}
@media(orientation:portrait){#rotate-msg{display:flex;}html,body{overflow:hidden;}}
</style>
<title>건파이터 2P</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none;}
:root{
  --bg:#1a1a2e;--surface:#16213e;--border:rgba(255,255,255,0.15);
  --p1:#00d4aa;--p2:#ff6b6b;
  --p1d:#00a884;--p2d:#e03e3e;
  --muted:#8899aa;--text:#eef2ff;
  --danger:#ff6b6b;--warn:#ffd166;--info:#00d4aa;
  --font:'Noto Sans KR',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#c{display:block;position:absolute;top:0;left:0;}

/* ── HUD ──────────────────────────────────── */
#hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
.ph{position:absolute;top:12px;display:flex;flex-direction:column;gap:5px;}
.ph1{left:12px;}.ph2{right:12px;align-items:flex-end;}
.p-name{font-size:9px;letter-spacing:3px;font-weight:700;}
.n1{color:var(--p1);}.n2{color:var(--p2);}
.bar-row{display:flex;align-items:center;gap:5px;margin-top:3px;}
.bar-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;width:16px;}
.bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;}
.bar.hp{width:90px;}.bar.sh{width:60px;}
.bar-fill{height:100%;border-radius:2px;transition:width .1s;}
.hp1f{background:var(--p1);}.sh1f{background:var(--info);}
.hp2f{background:var(--p2);}.sh2f{background:var(--info);}

/* ── GUN BARS ─────────────────────────────── */
#gunBar1,#gunBar2{position:absolute;display:flex;gap:4px;pointer-events:all;z-index:12;}
#gunBar1{left:12px;bottom:10px;}
#gunBar2{right:12px;bottom:10px;}
.gs{width:50px;height:56px;border-radius:5px;border:1px solid var(--border);background:rgba(255,255,255,0.02);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .15s;}
.gs:active{transform:scale(.95);}
.gs.a1{border-color:var(--p1);background:rgba(74,240,176,0.09);}
.gs.a2{border-color:var(--p2);background:rgba(240,128,74,0.09);}
.gs-k{font-size:8px;color:var(--muted);}
.gs-ico{width:28px;height:20px;}
.gs-n{font-size:6px;color:var(--muted);letter-spacing:.3px;}

/* ── AMMO HUD ─────────────────────────────── */
.ammo-hud{position:absolute;display:flex;flex-direction:column;gap:2px;}
.ah1{left:12px;bottom:76px;}.ah2{right:12px;bottom:76px;align-items:flex-end;}
.ammo-big{font-size:22px;font-weight:900;line-height:1;letter-spacing:-1px;}
.ammo-res{font-size:9px;color:var(--muted);}
.ammo-pips{display:flex;gap:2px;flex-wrap:wrap;max-width:130px;margin-top:2px;}
.ah2 .ammo-pips{justify-content:flex-end;}
.pip{width:4px;height:10px;border-radius:1px;}
.pf1{background:var(--p1);}.pf2{background:var(--p2);}.pe{background:rgba(255,255,255,0.07);}
.gun-lbl{font-size:9px;font-weight:700;letter-spacing:1px;}
.rld-bar{height:2px;border-radius:1px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:2px;width:100px;}
.rld-fill{height:100%;background:var(--warn);width:0%;}

/* ── SCORE ────────────────────────────────── */
#cscore{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;}
.cs-kills{font-size:26px;font-weight:900;letter-spacing:-2px;display:flex;gap:16px;align-items:center;}
.cs-sep{font-size:14px;color:var(--muted);}
.cs-wave{font-size:8px;letter-spacing:3px;color:var(--muted);margin-top:2px;}

/* ── KILL FEED ────────────────────────────── */
#kfeed{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;align-items:center;z-index:11;pointer-events:none;}
.kf{font-size:10px;padding:2px 10px;border-radius:2px;background:rgba(0,0,0,0.6);white-space:nowrap;animation:kfIn .2s ease;}
@keyframes kfIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

/* ── DAMAGE VIGNETTE ──────────────────────── */
#dv1,#dv2{position:absolute;inset:0;pointer-events:none;z-index:8;opacity:0;transition:opacity .1s;}
#dv1{background:radial-gradient(ellipse at 20% 50%,transparent 50%,rgba(240,74,74,.6) 100%);}
#dv2{background:radial-gradient(ellipse at 80% 50%,transparent 50%,rgba(240,74,74,.6) 100%);}

/* ── CROSSHAIR ────────────────────────────── */
.xh{position:absolute;pointer-events:none;z-index:15;transform:translate(-50%,-50%);}

/* ── MOBILE CONTROLS ──────────────────────── */
#mobileCtrl1,#mobileCtrl2{position:absolute;bottom:0;pointer-events:all;z-index:20;display:none;}
#mobileCtrl1{left:0;width:50%;height:220px;}
#mobileCtrl2{right:0;width:50%;height:220px;}

/* joystick */
.joystick-zone{position:absolute;bottom:16px;width:120px;height:120px;border-radius:50%;}
#jz1{left:16px;}
#jz2{right:16px;}
.joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);}
.joystick-knob{position:absolute;width:44px;height:44px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#jk1{background:radial-gradient(circle,rgba(0,212,170,0.55),rgba(0,212,170,0.18));border:2px solid rgba(0,212,170,0.6);}
#jk2{background:radial-gradient(circle,rgba(255,107,107,0.55),rgba(255,107,107,0.18));border:2px solid rgba(255,107,107,0.6);}

/* action buttons */
.act-btns{position:absolute;bottom:20px;display:flex;align-items:flex-end;gap:10px;}
#ab1{right:8px;}
#ab2{left:8px;}
.act-btn{border:none;font-family:var(--font);font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:16px;transition:transform .08s,opacity .08s;}
.act-btn:active{transform:scale(.9);opacity:.8;}

/* SHOOT — big, chunky */
.shoot-btn1{width:76px;height:76px;border-radius:50%;background:var(--p1);color:#fff;font-size:11px;letter-spacing:1px;box-shadow:0 4px 0 #007a60,0 0 24px rgba(0,212,170,0.35);}
.shoot-btn2{width:76px;height:76px;border-radius:50%;background:var(--p2);color:#fff;font-size:11px;letter-spacing:1px;box-shadow:0 4px 0 #a02020,0 0 24px rgba(255,107,107,0.35);}

/* JUMP — medium, pill shape */
.jump-btn1{width:56px;height:56px;border-radius:50%;background:rgba(0,212,170,0.18);border:2px solid rgba(0,212,170,0.6);color:var(--p1);font-size:18px;box-shadow:0 3px 0 rgba(0,212,170,0.25);}
.jump-btn2{width:56px;height:56px;border-radius:50%;background:rgba(255,107,107,0.18);border:2px solid rgba(255,107,107,0.6);color:var(--p2);font-size:18px;box-shadow:0 3px 0 rgba(255,107,107,0.25);}

/* RELOAD — small */
.reload-btn1{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);color:rgba(0,212,170,0.85);font-size:8px;letter-spacing:.5px;}
.reload-btn2{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,107,107,0.85);font-size:8px;letter-spacing:.5px;}

/* mobile mode indicator */
#mobileIndicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:none;z-index:5;opacity:0.06;}

/* ── OVERLAY ──────────────────────────────── */
#ov{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(10,12,28,.96);overflow-y:auto;overflow-x:hidden;}
/* 가로모드일 때 메뉴가 좌우로 나란히 배치되어 겹치지 않도록 */
.ov-card{max-width:700px;width:100%;padding:16px 20px 20px;text-align:center;margin:auto;display:flex;flex-direction:column;align-items:center;}
@media(orientation:landscape){
  .ov-card{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:0 24px;align-items:flex-start;padding:12px 16px;}
  .ov-card-title-block{width:100%;margin-bottom:8px;}
  #mapSelScreen{flex:1;min-width:220px;max-width:300px;margin-bottom:0;}
  .mode-section{flex:1;min-width:200px;max-width:260px;}
  .ov-card .btn-go{width:100%;margin-top:8px;}
}
.ov-title{font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:3px;}
.ov-sub{font-size:10px;letter-spacing:4px;color:var(--muted);margin-bottom:12px;}

/* Map select in title screen */
#mapSelScreen{margin-bottom:14px;width:100%;}
.map-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px;}
.map-card{border:2px solid var(--border);border-radius:14px;padding:9px;cursor:pointer;transition:all .15s;background:rgba(255,255,255,0.04);}
.map-card:hover{background:rgba(255,255,255,0.08);transform:scale(1.02);}
.map-card.sel{border-color:var(--p1);background:rgba(0,212,170,0.12);transform:scale(1.02);}
.map-card-name{font-size:11px;font-weight:900;letter-spacing:1px;margin-bottom:2px;}
.map-card-desc{font-size:8px;color:var(--muted);letter-spacing:.5px;}
.map-card-preview{width:100%;height:32px;border-radius:4px;margin-bottom:5px;overflow:hidden;position:relative;}

/* Mode select */
.mode-section{width:100%;margin-bottom:14px;}
.mode-row{display:flex;gap:7px;margin-bottom:0;justify-content:center;}
.mode-btn{flex:1;max-width:150px;padding:9px 10px;border-radius:14px;border:2px solid var(--border);background:rgba(255,255,255,0.04);cursor:pointer;transition:all .15s;font-family:var(--font);}
.mode-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.02);}
.mode-btn.sel{border-color:var(--p1);background:rgba(0,212,170,0.12);transform:scale(1.02);}
.mode-btn-name{font-size:10px;font-weight:900;letter-spacing:1px;color:#fff;margin-bottom:3px;}
.mode-btn-desc{font-size:8px;color:var(--muted);}

/* section label */
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-align:left;margin-bottom:7px;text-transform:uppercase;}

.btn-go{background:linear-gradient(135deg,#00d4aa,#00b894);color:#fff;border:none;padding:13px 48px;font-family:var(--font);font-size:14px;font-weight:900;letter-spacing:2px;border-radius:99px;cursor:pointer;transition:all .12s;pointer-events:all;box-shadow:0 5px 0 #008060,0 0 28px rgba(0,212,170,0.35);}
.btn-go:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 7px 0 #008060,0 0 44px rgba(0,212,170,0.5);}
.btn-go:active{transform:translateY(2px);box-shadow:0 2px 0 #008060;}
.score-row{display:flex;justify-content:center;gap:40px;margin:14px 0 20px;}
.sr-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sr-lbl{font-size:8px;letter-spacing:3px;color:var(--muted);}
.sr-val{font-size:38px;font-weight:900;letter-spacing:-2px;}

/* enemy toggle */
#noEnemyBadge{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:2px;color:var(--warn);padding:2px 10px;border:1px solid rgba(240,192,74,.3);border-radius:2px;pointer-events:none;z-index:11;}

/* mobile gun quick-switch */
#mGunSwitch1,#mGunSwitch2{position:absolute;pointer-events:all;z-index:21;display:none;gap:3px;}
#mGunSwitch1{bottom:160px;left:8px;}
#mGunSwitch2{bottom:160px;right:8px;}
.mgs{width:40px;height:44px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;}
.mgs.a1{border-color:var(--p1);background:rgba(74,240,176,.08);}
.mgs.a2{border-color:var(--p2);background:rgba(240,128,74,.08);}
.mgs-ico{width:22px;height:16px;}
.mgs-n{font-size:5px;color:var(--muted);}

@media(max-width:600px){
  .bar.hp{width:70px;}.bar.sh{width:50px;}
  .ov-card{padding:20px 16px;}
  .ov-title{font-size:38px;}
  .map-grid{grid-template-columns:repeat(2,1fr);}
  .ammo-big{font-size:18px;}
  #gunBar1,#gunBar2{display:none;}
  #mGunSwitch1,#mGunSwitch2{display:flex;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="ph ph1">
    <div class="p-name n1">P1</div>
    <div class="bar-row"><span class="bar-lbl">HP</span><div class="bar hp"><div class="bar-fill hp1f" id="hp1" style="width:100%"></div></div></div>
    <div class="bar-row"><span class="bar-lbl">SH</span><div class="bar sh"><div class="bar-fill sh1f" id="sh1" style="width:100%"></div></div></div>
  </div>
  <div class="ph ph2">
    <div class="p-name n2" style="text-align:right">P2</div>
    <div class="bar-row" style="flex-direction:row-reverse;"><span class="bar-lbl" style="text-align:right">HP</span><div class="bar hp"><div class="bar-fill hp2f" id="hp2" style="width:100%"></div></div></div>
    <div class="bar-row" style="flex-direction:row-reverse;"><span class="bar-lbl" style="text-align:right">SH</span><div class="bar sh"><div class="bar-fill sh2f" id="sh2" style="width:100%"></div></div></div>
  </div>
  <div id="cscore">
    <div class="cs-kills"><span class="n1" id="k1">0</span><span class="cs-sep">:</span><span class="n2" id="k2">0</span></div>
    <div class="cs-wave" id="wv">WAVE 1</div>
  </div>
  <div id="kfeed"></div>
  <div id="noEnemyBadge" style="display:none">연습 모드</div>
  <div class="ammo-hud ah1">
    <div class="gun-lbl n1" id="gn1">PISTOL</div>
    <div class="ammo-big n1"><span id="ac1">15</span><span style="font-size:11px;color:var(--muted);">/</span><span style="font-size:11px;color:var(--muted);" id="am1">15</span></div>
    <div class="ammo-res" id="ar1">예비 120</div>
    <div class="rld-bar"><div class="rld-fill" id="rb1"></div></div>
    <div class="ammo-pips" id="ap1"></div>
  </div>
  <div class="ammo-hud ah2">
    <div class="gun-lbl n2" id="gn2" style="text-align:right">PISTOL</div>
    <div class="ammo-big n2" style="text-align:right"><span id="ac2">15</span><span style="font-size:11px;color:var(--muted);">/</span><span style="font-size:11px;color:var(--muted);" id="am2">15</span></div>
    <div class="ammo-res" id="ar2" style="text-align:right">예비 120</div>
    <div class="rld-bar" style="align-self:flex-end"><div class="rld-fill" id="rb2"></div></div>
    <div class="ammo-pips" id="ap2"></div>
  </div>
  <div id="dv1"></div><div id="dv2"></div>
</div>

<!-- desktop gun bars -->
<div id="gunBar1"></div>
<div id="gunBar2"></div>

<!-- mobile gun switch -->
<div id="mGunSwitch1"></div>
<div id="mGunSwitch2"></div>

<!-- crosshair (desktop only) -->
<div class="xh" id="xh1" style="display:none">
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <line x1="13" y1="1" x2="13" y2="8" stroke="#4af0b0" stroke-width="1.5"/>
    <line x1="13" y1="18" x2="13" y2="25" stroke="#4af0b0" stroke-width="1.5"/>
    <line x1="1" y1="13" x2="8" y2="13" stroke="#4af0b0" stroke-width="1.5"/>
    <line x1="18" y1="13" x2="25" y2="13" stroke="#4af0b0" stroke-width="1.5"/>
    <circle cx="13" cy="13" r="2.5" stroke="#4af0b0" stroke-width="1" fill="none"/>
    <circle cx="13" cy="13" r="1" fill="#4af0b0" opacity=".6"/>
  </svg>
</div>

<!-- mobile controls -->
<div id="mobileCtrl1">
  <div class="joystick-zone" id="jz1">
    <div class="joystick-base"></div>
    <div class="joystick-knob" id="jk1"></div>
  </div>
  <div class="act-btns" id="ab1" style="right:8px;bottom:24px;">
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <button class="act-btn reload-btn1" id="rld1Btn">재장전</button>
      <button class="act-btn jump-btn1" id="jmp1Btn">▲</button>
    </div>
    <button class="act-btn shoot-btn1" id="sht1Btn">발사</button>
  </div>
</div>
<div id="mobileCtrl2">
  <div class="joystick-zone" id="jz2" style="right:16px;left:auto;">
    <div class="joystick-base"></div>
    <div class="joystick-knob" id="jk2"></div>
  </div>
  <div class="act-btns" id="ab2" style="left:8px;bottom:24px;">
    <button class="act-btn shoot-btn2" id="sht2Btn">발사</button>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <button class="act-btn reload-btn2" id="rld2Btn">재장전</button>
      <button class="act-btn jump-btn2" id="jmp2Btn">▲</button>
    </div>
  </div>
</div>

<!-- 세로모드 안내 -->
<div id="rotate-msg">
  <svg class="rm-ico" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="16" y="8" width="24" height="40" rx="4" stroke="#00d4aa" stroke-width="2.5"/>
    <circle cx="28" cy="42" r="2" fill="#00d4aa"/>
    <path d="M36 22 L44 28 L36 34" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="28" y1="28" x2="44" y2="28" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p>가로 모드로 돌려주세요</p>
</div>

<!-- overlay -->
<div id="ov">
  <!-- START CARD -->
  <div class="ov-card" id="startCard">
    <div class="ov-card-title-block" style="width:100%;text-align:center;">
      <div class="ov-title">건<span style="color:var(--p1)">파</span><span style="color:var(--p2)">이</span>터</div>
      <div class="ov-sub">2P LOCAL GUNFIGHTER</div>
    </div>

    <!-- MAP SELECTION -->
    <div id="mapSelScreen">
      <div class="sec-lbl">맵 선택</div>
      <div class="map-grid" id="mapGrid"></div>
    </div>

    <!-- MODE SELECTION -->
    <div class="mode-section">
      <div class="sec-lbl">게임 모드</div>
      <div class="mode-row">
        <div class="mode-btn sel" id="mode-normal" onclick="setMode('normal')">
          <div class="mode-btn-name">일반</div>
          <div class="mode-btn-desc">웨이브 + PvP</div>
        </div>
        <div class="mode-btn" id="mode-pvp" onclick="setMode('pvp')">
          <div class="mode-btn-name">PvP</div>
          <div class="mode-btn-desc">적 없음</div>
        </div>
        <div class="mode-btn" id="mode-coop" onclick="setMode('coop')">
          <div class="mode-btn-name">협동</div>
          <div class="mode-btn-desc">같이 처치</div>
        </div>
      </div>
    </div>

    <button class="btn-go" id="btnStart">시작하기</button>
  </div>

  <!-- GAME OVER CARD -->
  <div class="ov-card" id="goCard" style="display:none">
    <div class="ov-title" id="winTxt">P1 승리</div>
    <div class="ov-sub">GAME OVER</div>
    <div class="score-row">
      <div class="sr-item"><div class="sr-lbl">P1 킬</div><div class="sr-val n1" id="fk1">0</div></div>
      <div class="sr-item"><div class="sr-lbl">P2 킬</div><div class="sr-val n2" id="fk2">0</div></div>
    </div>
    <button class="btn-go" id="btnRestart">다시 시작</button>
  </div>
</div>

<script>
// ─── SVG GUN ICONS (detailed, realistic) ─────────────────────────────────────
const GICO={
  pistol:`<svg viewBox="0 0 40 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- barrel -->

// ─── JOYSTICK SYSTEM ─────────────────────────────────────
const joys=[
  {pid:0,el:null,knob:null,active:false,tid:-1,startX:0,startY:0,dx:0,dy:0},
  {pid:1,el:null,knob:null,active:false,tid:-1,startX:0,startY:0,dx:0,dy:0},
];

function initJoysticks(){
  joys[0].el=document.getElementById('jz1');
  joys[0].knob=document.getElementById('jk1');
  joys[1].el=document.getElementById('jz2');
  joys[1].knob=document.getElementById('jk2');

  joys.forEach((j,ji)=>{
    const zone=j.el;
    zone.addEventListener('touchstart',e=>{
      e.preventDefault();
      const t=e.changedTouches[0];
      const r=zone.getBoundingClientRect();
      j.active=true; j.tid=t.identifier;
      j.startX=r.left+r.width/2; j.startY=r.top+r.height/2;
      j.dx=0; j.dy=0;
    },{passive:false});
    document.addEventListener('touchmove',e=>{
      if(!j.active) return;
      for(const t of e.changedTouches){
        if(t.identifier===j.tid){
          const maxR=46;
          const rx=t.clientX-j.startX,ry=t.clientY-j.startY;
          const len=Math.hypot(rx,ry);
          const cx2=len>maxR?rx/len*maxR:rx;
          const cy2=len>maxR?ry/len*maxR:ry;
          j.knob.style.transform=`translate(calc(-50% + ${cx2}px),calc(-50% + ${cy2}px))`;
          j.dx=cx2/maxR; j.dy=cy2/maxR;
          break;
        }
      }
    },{passive:false});
    document.addEventListener('touchend',e=>{
      for(const t of e.changedTouches){
        if(t.identifier===j.tid){
          j.active=false; j.dx=0; j.dy=0;
          j.knob.style.transform='translate(-50%,-50%)';
          break;
        }
      }
    },{passive:false});
  });
}

    pc.fillStyle=g; pc.fillRect(0,0,120,36);
    pc.fillStyle=m.gc; pc.fillRect(0,28,120,8);
    pc.fillStyle=m.pc;
    // draw some mini platforms
    [[5,20,22],[30,15,18],[55,12,20],[80,18,22],[100,10,15]].forEach(([x,y,w])=>{
      pc.fillRect(x,y,w,3);
    });

    card.appendChild(pv);
    card.innerHTML+=`<div class="map-card-name">${m.label}</div><div class="map-card-desc">${m.desc}</div>`;
    card.prepend(pv);

    card.addEventListener('click',()=>{
      mapId=id;
      document.querySelectorAll('.map-card').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');
      platforms=MAPS[id].plats(W,H);
    });
    grid.appendChild(card);
  });
}

function setMode(m){
  gameMode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('mode-'+m).classList.add('sel');
}
window.setMode=setMode;

// ─── GUN BAR BUILD ───────────────────────────────────────
function buildBars(){
  [0,1].forEach(pi=>{
    // desktop bar
    const bar=document.getElementById('gunBar'+(pi+1));
    bar.innerHTML='';
    GUNS.forEach((g,gi)=>{
      const s=document.createElement('div');
      s.className='gs'+(P[pi].gi===gi?' a'+(pi+1):'');
      s.innerHTML=`<div class="gs-k">${g.key}</div><div class="gs-ico" style="color:${pi===0?'var(--p1)':'var(--p2)'}">${GICO[g.id]}</div><div class="gs-n">${g.name}</div>`;
      s.addEventListener('click',()=>{ if(running) switchGun(P[pi],gi); });
      bar.appendChild(s);
    });

    // mobile mini bar
    const mbar=document.getElementById('mGunSwitch'+(pi+1));
    mbar.innerHTML='';
    GUNS.forEach((g,gi)=>{
      const s=document.createElement('div');
      s.className='mgs'+(P[pi].gi===gi?' a'+(pi+1):'');
      s.innerHTML=`<div class="mgs-ico" style="color:${pi===0?'var(--p1)':'var(--p2)'}">${GICO[g.id]}</div><div class="mgs-n">${g.name}</div>`;
      s.addEventListener('touchstart',e=>{ e.preventDefault(); if(running) switchGun(P[pi],gi); },{passive:false});
      mbar.appendChild(s);
    });
  });
}

// ─── GUN SYSTEM ──────────────────────────────────────────
function initGuns(p){
  p.guns=GUNS.map(g=>({...g,ammo:g.magSize,res:g.reserveMax,cd:0,reloading:false,rp:0}));
}
function switchGun(p,idx){
  p.gi=Math.max(0,Math.min(4,idx));
  buildBars(); updateAmmo(p);
}
function reload(p){
  const g=p.guns[p.gi];
  if(g.reloading||g.res<=0||g.ammo===g.magSize) return;
  g.reloading=true; g.rp=0;
}
function shoot(p){
  if(!p.alive) return;
  const g=p.guns[p.gi];
  if(g.reloading||g.cd>0||g.ammo<=0) return;
  const ox=p.x+p.w/2,oy=p.y+p.h/2;
  const ba=Math.atan2(p.aim.y-oy,p.aim.x-ox);
  const maxL=Math.ceil(g.range/g.bulletSpeed);
  for(let i=0;i<g.pellets;i++){
    const a=ba+(Math.random()-.5)*g.spread*2;
    bullets.push({x:ox,y:oy,vx:Math.cos(a)*g.bulletSpeed,vy:Math.sin(a)*g.bulletSpeed,
      dmg:g.damage,own:p.i,life:maxL,maxL,r:g.pellets>1?2.5:3.5,
      col:p.i===0?'#4af0b0':'#f0804a',trail:[]});
  }
  g.ammo--; g.cd=g.fireRate; p.recoilY-=g.recoil;
  spawnFlash(ox,oy,p.i===0?'#4af0b0':'#f0804a');
  if(g.ammo<=0) reload(p);
  updateAmmo(p);
}
function tickGuns(p,dt){
  const g=p.guns[p.gi];
  g.cd=Math.max(0,g.cd-dt);
  if(g.reloading){
    g.rp+=dt/g.reloadTime;
    if(g.rp>=1){
      const need=g.magSize-g.ammo,got=Math.min(need,g.res);
      g.ammo+=got; g.res-=got; g.reloading=false; g.rp=0; updateAmmo(p);
    }
    document.getElementById('rb'+(p.i+1)).style.width=(g.rp*100)+'%';
  } else {
    document.getElementById('rb'+(p.i+1)).style.width='0%';
  }
  if(g.auto){
    if(p.i===0&&(p.shootHeld||(isMobile&&mobileShoot[0]))) shoot(p);
    if(p.i===1&&((keys['Enter']||keys['NumpadEnter'])||(isMobile&&mobileShoot[1]))) shoot(p);
  }
}

// ─── ENEMIES ─────────────────────────────────────────────
const ET=[
  {type:'grunt', w:24,h:30,hp:60, sp:1.8,dmg:10,sc:100,col:'#e84a4a',fr:1800,rng:380,ranged:true},
  {type:'runner',w:20,h:28,hp:35, sp:3.2,dmg:18,sc:150,col:'#f08040',fr:0,   rng:36, ranged:false},
  {type:'heavy', w:32,h:40,hp:200,sp:0.9,dmg:22,sc:300,col:'#9040e0',fr:2200,rng:420,ranged:true},
  {type:'sniper',w:22,h:30,hp:50, sp:0.4,dmg:65,sc:250,col:'#4060e0',fr:3200,rng:700,ranged:true},
];
function spawnEnemy(){
  if(gameMode==='pvp') return; // no enemies in pvp mode
  const t=ET[Math.min(Math.floor(Math.random()*(1+Math.floor(wave/3))),ET.length-1)];
  const base=P[Math.random()<.5?0:1];
  const side=Math.random()<.5?-1:1;
  enemies.push({...t,x:base.x+side*(W*.55+Math.random()*200),y:H-56-t.h,
    vx:0,vy:0,onGround:false,
    hp:t.hp*(.8+wave*.15),maxHp:t.hp*(.8+wave*.15),
    cd:Math.random()*t.fr,alive:true,facing:side===-1?1:-1,flash:0});
}

// ─── PHYSICS ─────────────────────────────────────────────
const GR=0.45,JV=-11.5,SPD=5;
function phys(e){
  e.onGround=false;
  for(const p of platforms){
    if(p.wall){
      if(e.y+e.h>p.y&&e.y<p.y+p.h){
        if(e.x+e.w>p.x&&e.x<p.x+p.w){
          if(e.vx>0) e.x=p.x-e.w; else e.x=p.x+p.w; e.vx=0;
        }
      }
    } else {
      if(e.x+e.w>p.x&&e.x<p.x+p.w){
        const b=e.y+e.h;
        if(e.vy>=0&&b>p.y&&b-e.vy<=p.y+6){e.y=p.y-e.h;e.vy=0;e.onGround=true;}
        else if(e.vy<0&&e.y<p.y+p.h&&e.y-e.vy>=p.y+p.h){e.y=p.y+p.h;e.vy=0;}
      }
    }
  }
}

// ─── CAMERA ──────────────────────────────────────────────
const cam={x:0,y:0};
function tickCam(){
  const mx=(P[0].x+P[1].x)/2, my=(P[0].y+P[1].y)/2;
  cam.x+=(mx-W/2-cam.x)*.09; cam.y+=(my-H/2-cam.y)*.09;
  cam.y=Math.max(-300,Math.min(H*.18,cam.y));
}

// ─── MAIN LOOP ───────────────────────────────────────────
let lastT=0;
function loop(ts){
  const dt=Math.min(ts-lastT,50); lastT=ts;
  if(!running){requestAnimationFrame(loop);return;}

  // P2 auto-aim (desktop mode) or joystick aim (mobile)
  const p2=P[1];
  if(isMobile){
    // mobile P2: aim in joystick direction
    const j=joys[1];
    if(j.active&&(Math.abs(j.dx)>.1||Math.abs(j.dy)>.1)){
      p2.aim.x=p2.x+p2.w/2+j.dx*300;
      p2.aim.y=p2.y+p2.h/2+j.dy*200;
    } else {
      p2.aim.x=p2.x+p2.w/2+p2.facing*260;
      p2.aim.y=p2.y+p2.h/2;
    }
  } else {
    p2.aim.x=p2.x+p2.w/2+p2.facing*260;
    p2.aim.y=p2.y+p2.h/2;
  }

  // P1 mobile aim: aim in facing direction
  if(isMobile){
    const j=joys[0];
    if(j.active&&(Math.abs(j.dx)>.1||Math.abs(j.dy)>.1)){
      P[0].aim.x=P[0].x+P[0].w/2+j.dx*300;
      P[0].aim.y=P[0].y+P[0].h/2+j.dy*200;
    } else {
      P[0].aim.x=P[0].x+P[0].w/2+P[0].facing*260;
      P[0].aim.y=P[0].y+P[0].h/2;
    }
  }

  P.forEach(p=>{ if(p.alive){tickPlayer(p,dt);tickGuns(p,dt);} });
  tickBullets(); tickEnemies(dt); tickParts(dt); tickCam(); tickWave(dt);
  updateHUD(); draw();
  requestAnimationFrame(loop);
}

function tickPlayer(p,dt){
  let mx=0;
  const ji=joys[p.i];
  if(p.i===0){
    if(isMobile){
      mx=Math.abs(ji.dx)>.15?ji.dx:0;
      if(mobileJump[0]&&p.onGround){ p.vy=JV; mobileJump[0]=false; }
    } else {
      if(keys['KeyA']) mx=-1; if(keys['KeyD']) mx=1;
      if((keys['KeyW']||keys['Space'])&&p.onGround) p.vy=JV;
    }
  } else {
    if(isMobile){
      mx=Math.abs(ji.dx)>.15?ji.dx:0;
      if(mobileJump[1]&&p.onGround){ p.vy=JV; mobileJump[1]=false; }
    } else {
      if(keys['ArrowLeft']) mx=-1; if(keys['ArrowRight']) mx=1;
      if(keys['ArrowUp']&&p.onGround) p.vy=JV;
    }
  }
  p.vx=mx*SPD; if(Math.abs(mx)>.1) p.facing=mx>0?1:-1;
  p.vy+=GR; p.x+=p.vx; p.y+=p.vy;
  p.x=Math.max(-1500,Math.min(4e3,p.x));
  phys(p); p.recoilY*=.82;
  p.shDelay-=dt;
  if(p.shDelay<=0&&p.sh<p.maxSh) p.sh=Math.min(p.maxSh,p.sh+.025*dt);
  if(p.inv>0) p.inv-=dt;
}

function tickBullets(){
  outer: for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.unshift({x:b.x,y:b.y}); if(b.trail.length>5) b.trail.pop();
    b.x+=b.vx; b.y+=b.vy; b.life--;
    for(const p of platforms){
      if(b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+(p.h||16)){
        spawnSparks(b.x,b.y,'#666',3); bullets.splice(i,1); continue outer;
      }
    }
    if(b.life<=0){bullets.splice(i,1);continue;}
    if(b.own===0||b.own===1){
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j]; if(!e.alive) continue;
        if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
          hurtEnemy(e,j,b.dmg,b.own); spawnSparks(b.x,b.y,b.col,5);
          bullets.splice(i,1); continue outer;
        }
      }
      // friendly fire (only in normal/coop)
      if(gameMode==='normal'||gameMode==='pvp'){
        const tgt=P[1-b.own];
        if(tgt.alive&&tgt.inv<=0&&b.x>tgt.x&&b.x<tgt.x+tgt.w&&b.y>tgt.y&&b.y<tgt.y+tgt.h){
          const ffDmg=gameMode==='pvp'?b.dmg:b.dmg*.4;
          hurtPlayer(tgt,ffDmg); spawnSparks(b.x,b.y,b.col,3); bullets.splice(i,1); continue outer;
        }
      }
    }
    if(b.own==='e'){
      for(const p of P){
        if(p.alive&&p.inv<=0&&b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h){
          hurtPlayer(p,b.dmg); spawnSparks(b.x,b.y,'#f04a4a',4);
          bullets.splice(i,1); continue outer;
        }
      }
    }
  }
}

function hurtPlayer(p,dmg){
  if(p.sh>0){const ab=Math.min(p.sh,dmg);p.sh-=ab;dmg-=ab;}
  p.hp=Math.max(0,p.hp-dmg); p.inv=350; p.shDelay=4500;
  const dv=document.getElementById('dv'+(p.i+1));
  dv.style.opacity='1'; setTimeout(()=>dv.style.opacity='0',130);
  if(p.hp<=0){p.alive=false;setTimeout(checkEnd,800);}
}
function hurtEnemy(e,idx,dmg,killer){
  e.hp-=dmg; e.flash=140;
  addFloat(e.x+e.w/2-cam.x,e.y-cam.y,'-'+Math.ceil(dmg),'#fff',11);
  if(e.hp<=0){
    e.alive=false;
    if(killer===0||killer===1) P[killer].kills++;
    addKF(e.type,killer);
    spawnDeath(e.x+e.w/2,e.y+e.h/2,e.col);
    enemies.splice(idx,1);
  }
}

function tickEnemies(dt){
  if(gameMode==='pvp') return;
  for(const e of enemies){
    if(!e.alive) continue;
    let tgt=null,best=Infinity;
    // coop mode: both players are targets
    P.forEach(p=>{ if(!p.alive) return; const d=Math.hypot(p.x-e.x,p.y-e.y); if(d<best){best=d;tgt=p;} });
    if(!tgt) continue;
    const tx=tgt.x+tgt.w/2,ty=tgt.y+tgt.h/2,ex=e.x+e.w/2,ey=e.y+e.h/2;
    const dist=Math.hypot(tx-ex,ty-ey);
    e.facing=tx<ex?-1:1;
    if(e.ranged){
      if(dist>e.rng) e.vx=Math.sign(tx-ex)*e.sp;
      else if(dist<e.rng*.5) e.vx=-Math.sign(tx-ex)*e.sp*.6;
      else e.vx=0;
      e.cd-=dt;
      if(e.cd<=0&&dist<e.rng){
        const ang=Math.atan2(ty-ey,tx-ex)+(Math.random()-.5)*.12;
        bullets.push({x:ex,y:ey,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,dmg:e.dmg,col:'#f04a4a',own:'e',life:120,maxL:120,r:3,trail:[]});
        e.cd=e.fr+Math.random()*400;
      }
    } else {
      e.vx=Math.sign(tx-ex)*e.sp;
      if(dist<e.w+tgt.w&&tgt.inv<=0){hurtPlayer(tgt,e.dmg);tgt.inv=900;}
    }
    if(e.onGround&&Math.random()<.015) e.vy=JV*.75;
    e.vy+=GR; e.x+=e.vx; e.y+=e.vy; phys(e);
    if(e.flash>0) e.flash-=16;
  }
}

function tickParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.vx*=.97; p.life-=dt;
    p.a=Math.max(0,p.life/p.ml); if(p.life<=0) parts.splice(i,1);
  }
}

function tickWave(dt){
  if(gameMode==='pvp') return;
  const total=6+wave*4;
  if(enemies.length===0&&wSpawned>=total){wave++;wSpawned=0;addFloat(W/2,H*.4,'WAVE '+wave,'#4af0b0',22);}
  if(wSpawned<total){ wTimer-=dt; if(wTimer<=0){spawnEnemy();wSpawned++;wTimer=Math.max(700,2200-wave*120);} }
}

function checkEnd(){
  if(gameMode==='coop'){
    if(P[0].alive||P[1].alive) return;
  } else {
    if(P[0].alive&&P[1].alive) return;
  }
  running=false;
  let wc,wTxt;
  if(gameMode==='coop'){
    wTxt='패배...';
    wc='var(--danger)';
  } else {
    const w=P[0].alive?0:1;
    wc=w===0?'var(--p1)':'var(--p2)';
    wTxt=`<span style="color:${wc}">P${w+1}</span> 승리`;
  }
  document.getElementById('winTxt').innerHTML=wTxt;
  document.getElementById('fk1').textContent=P[0].kills;
  document.getElementById('fk2').textContent=P[1].kills;
  document.getElementById('startCard').style.display='none';
  document.getElementById('goCard').style.display='block';
  document.getElementById('ov').style.display='flex';
}

// ─── DRAW ─────────────────────────────────────────────────
function draw(){
  cx.clearRect(0,0,W,H);
  drawBg();
  cx.save(); cx.translate(-Math.round(cam.x),-Math.round(cam.y));
  drawPlats(); drawParts(); drawBullets(); drawRanges();
  P.forEach(p=>{ if(p.alive) drawPlayer(p); });
  drawEnemies();
  cx.restore();
  drawFloats();
}

function drawBg(){
  const m=MAPS[mapId];
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,m.bg0); g.addColorStop(1,m.bg1);
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(255,255,255,.32)';
  for(let i=0;i<65;i++){
    const sx=((i*173+Math.floor(cam.x*.28))%W+W)%W;
    const sy=((i*113)%(H*.72));
    const r=i%4===0?1.2:i%7===0?1:.5;
    cx.beginPath(); cx.arc(sx,sy,r,0,Math.PI*2); cx.fill();
  }
  cx.fillStyle=m.sky; cx.fillRect(0,0,W,H*.4);
  cx.fillStyle='rgba(20,20,40,0.5)';
  for(let i=0;i<10;i++){
    const bx=((i*250-cam.x*.14)%W+W)%W-90;
    cx.fillRect(bx,H-56-(70+i*28),50+i*12,70+i*28);
  }
}

function drawPlats(){
  const m=MAPS[mapId];
  for(const p of platforms){
    if(p.g){
      cx.fillStyle=m.gc; cx.fillRect(p.x,p.y,p.w,p.h);
      cx.fillStyle=m.gt; cx.fillRect(p.x,p.y,p.w,4);
      cx.strokeStyle='rgba(255,255,255,0.025)'; cx.lineWidth=1;
      for(let gx=Math.floor(p.x/90)*90;gx<p.x+p.w;gx+=90){
        cx.beginPath(); cx.moveTo(gx,p.y); cx.lineTo(gx,p.y+p.h); cx.stroke();
      }
    } else if(p.wall){
      cx.fillStyle=m.pc; cx.fillRect(p.x,p.y,p.w,p.h);
      cx.strokeStyle=m.pg.replace('0.5','0.2'); cx.lineWidth=1; cx.strokeRect(p.x,p.y,p.w,p.h);
    } else {
      cx.fillStyle=m.pc;
      cx.beginPath(); if(cx.roundRect) cx.roundRect(p.x,p.y,p.w,p.h,3); else cx.rect(p.x,p.y,p.w,p.h);
      cx.fill();
      cx.strokeStyle=m.pg; cx.lineWidth=1; cx.stroke();
      cx.fillStyle=m.pg.replace('0.5','0.25'); cx.fillRect(p.x+3,p.y,p.w-6,2);
      cx.fillStyle=m.pg.replace('0.5','0.1');
      for(let hx=p.x+16;hx<p.x+p.w-8;hx+=28) cx.fillRect(hx,p.y+p.h,3,10);
    }
  }
}

function drawRanges(){
  P.forEach(p=>{
    if(!p.alive) return;
    const g=p.guns[p.gi];
    const pcx=p.x+p.w/2,pcy=p.y+p.h/2;
    cx.save();
    cx.strokeStyle=p.i===0?'rgba(74,240,176,0.1)':'rgba(240,128,74,0.1)';
    cx.lineWidth=1; cx.setLineDash([4,8]);
    cx.beginPath(); cx.arc(pcx,pcy,g.range,0,Math.PI*2); cx.stroke();
    cx.setLineDash([]);
    const ang=Math.atan2(p.aim.y-pcy,p.aim.x-pcx);
    const ex2=pcx+Math.cos(ang)*g.range,ey2=pcy+Math.sin(ang)*g.range;
    cx.strokeStyle=p.i===0?'rgba(74,240,176,0.18)':'rgba(240,128,74,0.18)';
    cx.lineWidth=1; cx.setLineDash([2,6]);
    cx.beginPath(); cx.moveTo(pcx,pcy); cx.lineTo(ex2,ey2); cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  });
}

function drawPlayer(p){
  const x=p.x,y=p.y+p.recoilY;
  const col=p.i===0?'#4af0b0':'#f0804a';
  cx.fillStyle='rgba(0,0,0,0.22)';
  cx.beginPath(); cx.ellipse(x+p.w/2,p.y+p.h,p.w*.42,4,0,0,Math.PI*2); cx.fill();
  if(p.inv>0&&Math.floor(p.inv/70)%2===0) return;
  cx.save(); cx.translate(x+p.w/2,y+p.h/2);
  if(p.facing===-1) cx.scale(-1,1);
  // body
  cx.fillStyle='#161628';
  cx.beginPath(); if(cx.roundRect) cx.roundRect(-p.w/2,-p.h/2,p.w,p.h,3); else cx.rect(-p.w/2,-p.h/2,p.w,p.h);
  cx.fill();
  // armor
  cx.fillStyle=col+'30'; cx.fillRect(-p.w/2+2,-p.h/2+2,p.w-4,p.h*.42);
  // visor
  cx.fillStyle=col+'cc'; cx.fillRect(-p.w/2+3,-p.h/2+5,p.w-6,7);
  // gun arm
  const aimAng=Math.atan2(p.aim.y-(y+p.h/2),p.aim.x-(x+p.w/2))*p.facing;
  cx.save(); cx.rotate(Math.max(-.65,Math.min(.65,aimAng)));
  const g=p.guns[p.gi];
  cx.fillStyle=col+'88'; cx.fillRect(3,-3,6,6);
  cx.fillStyle=col;
  const bl=g.id==='sniper'?30:g.id==='shotgun'?20:g.id==='rifle'?26:22;
  cx.fillRect(6,-3,bl,6);
  // barrel detail
  cx.fillStyle='rgba(255,255,255,0.6)'; cx.fillRect(6+bl-2,-2,3,4);
  // grip detail
  cx.fillStyle=col+'55'; cx.fillRect(8,-5,6,3);
  if(g.id==='sniper'){
    cx.fillStyle=col+'70'; cx.fillRect(10,-7,7,3); // scope
    cx.fillStyle='rgba(74,176,240,0.5)'; cx.fillRect(11,-6.5,5,2);
  }
  cx.restore();
  // label
  cx.fillStyle=col; cx.font='bold 8px sans-serif'; cx.textAlign='center';
  cx.fillText('P'+(p.i+1),0,-p.h/2-4);
  cx.restore();
}

function drawEnemies(){
  if(gameMode==='pvp') return;
  for(const e of enemies){
    if(!e.alive) continue;
    cx.save(); cx.translate(e.x+e.w/2,e.y+e.h/2);
    if(e.facing===1) cx.scale(-1,1);
    cx.fillStyle=e.flash>0?'#fff':e.col;
    cx.beginPath(); if(cx.roundRect) cx.roundRect(-e.w/2,-e.h/2,e.w,e.h,3); else cx.rect(-e.w/2,-e.h/2,e.w,e.h);
    cx.fill();
    const pct=e.hp/e.maxHp;
    cx.fillStyle='rgba(0,0,0,0.4)'; cx.fillRect(-e.w/2,-e.h/2-7,e.w,3);
    cx.fillStyle=pct>.5?'#4af080':'#f0a040'; cx.fillRect(-e.w/2,-e.h/2-7,e.w*pct,3);
    cx.fillStyle='rgba(255,255,120,.8)'; cx.fillRect(2,-e.h/2+6,4,3);
    cx.restore();
  }
}

function drawBullets(){
  for(const b of bullets){
    for(let i=0;i<b.trail.length;i++){
      const t=b.trail[i];
      cx.globalAlpha=(1-i/b.trail.length)*.4;
      cx.fillStyle=b.col;
      cx.beginPath(); cx.arc(t.x,t.y,b.r*(1-i/b.trail.length)*.6,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1; cx.fillStyle=b.col;
    cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.fill();
    cx.fillStyle=b.col+'28';
    cx.beginPath(); cx.arc(b.x,b.y,b.r*2.2,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
}

function drawParts(){
  for(const p of parts){
    cx.globalAlpha=p.a; cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
}

function drawFloats(){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=1.2; f.life-=16;
    if(f.life<=0){floats.splice(i,1);continue;}
    cx.globalAlpha=f.life/f.ml; cx.fillStyle=f.col;
    cx.font=`700 ${f.sz}px 'Noto Sans KR',sans-serif`;
    cx.textAlign='center'; cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1; cx.textAlign='left';
}

// ─── EFFECTS ─────────────────────────────────────────────
function spawnFlash(x,y,col){
  for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*2,col,life:180,ml:180,a:1});}
}
function spawnSparks(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,r:1+Math.random()*2,col,life:280,ml:280,a:1});}
}
function spawnDeath(x,y,col){
  for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*7;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:2+Math.random()*3,col,life:550,ml:550,a:1});}
}
function addFloat(x,y,txt,col,sz=12){
  floats.push({x,y,txt,col,sz,life:700,ml:700});
}
function addKF(etype,ki){
  const fd=document.getElementById('kfeed');
  const el=document.createElement('div'); el.className='kf';
  const nm={grunt:'기본병사',runner:'돌격병',heavy:'중장갑',sniper:'저격수'};
  const c=ki===0?'var(--p1)':ki===1?'var(--p2)':'var(--danger)';
  el.innerHTML=`<span style="color:${c}">${ki==='e'?'적':('P'+(ki+1))}</span> → ${nm[etype]||etype}`;
  fd.appendChild(el); setTimeout(()=>el.remove(),2400);
  while(fd.children.length>5) fd.firstChild.remove();
}

// ─── HUD ─────────────────────────────────────────────────
function updateHUD(){
  P.forEach((p,i)=>{
    document.getElementById('hp'+(i+1)).style.width=(p.hp/p.maxHp*100)+'%';
    document.getElementById('sh'+(i+1)).style.width=(p.sh/p.maxSh*100)+'%';
  });
  document.getElementById('k1').textContent=P[0].kills;
  document.getElementById('k2').textContent=P[1].kills;
  if(gameMode==='pvp'){
    document.getElementById('wv').textContent='PvP 모드';
  } else {
    document.getElementById('wv').textContent='WAVE '+wave;
  }
}
function updateAmmo(p){
  const i=p.i+1,g=p.guns[p.gi];
  document.getElementById('ac'+i).textContent=g.ammo;
  document.getElementById('am'+i).textContent=g.magSize;
  document.getElementById('ar'+i).textContent='예비 '+g.res;
  document.getElementById('gn'+i).textContent=g.name;
  const pip=document.getElementById('ap'+i); pip.innerHTML='';
  const show=Math.min(g.magSize,30);
  for(let j=0;j<show;j++){
    const d=document.createElement('div');
    d.className='pip '+(j<g.ammo?'pf'+i:'pe');
    pip.appendChild(d);
  }
}

// ─── START ───────────────────────────────────────────────
function startGame(){
  document.getElementById('ov').style.display='none';
  document.getElementById('startCard').style.display='block';
  document.getElementById('goCard').style.display='none';
  document.getElementById('noEnemyBadge').style.display=gameMode==='pvp'?'block':'none';
  wave=1; wTimer=0; wSpawned=0;
  bullets=[]; enemies=[]; parts=[]; floats=[];
  [0,1].forEach(i=>{
    Object.assign(P[i],mkP(i));
    P[i].x=i===0?180:W-230; P[i].y=H-200;
    initGuns(P[i]); updateAmmo(P[i]);
  });
  platforms=MAPS[mapId].plats(W,H);
  buildBars(); running=true;
  if(!started){started=true; lastT=performance.now(); requestAnimationFrame(loop);}
}
window.startGame=startGame;

document.getElementById('btnStart').addEventListener('click',startGame);
document.getElementById('btnRestart').addEventListener('click',startGame);

// ─── INIT ────────────────────────────────────────────────
resize();
detectMobile();
window.addEventListener('resize',detectMobile);
buildMapGrid();
buildBars();
initJoysticks();
setupMobileButtons();
cx.fillStyle='#06060e'; cx.fillRect(0,0,W,H);
</script>

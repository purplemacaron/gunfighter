<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isometric City Builder</title>
  <style>
    body { margin: 0; background: #1f2937; color: #e5e7eb; font-family: Arial, sans-serif; }
    #ui { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #111827; align-items: center; }
    button, select, input { padding: 6px 8px; border-radius: 6px; border: 1px solid #374151; background: #1f2937; color: #fff; }
    button.active { background: #2563eb; }
    #stats { margin-left: auto; font-size: 13px; }
    canvas { display: block; margin: 0 auto; background: linear-gradient(#87ceeb, #a7f3d0 45%); }
  </style>
</head>
<body>
  <div id="ui">
    <button id="modeRoad">도로 모드</button>
    <button id="modeBuild" class="active">건물 모드</button>
    <select id="buildType">
      <option value="residential">주거</option>
      <option value="commercial">상업</option>
      <option value="industrial">공업</option>
    </select>
    <button id="upgradeBtn">업그레이드</button>
    <label>건물 이미지 <input id="imgInput" type="file" accept="image/*" multiple /></label>
    <span style="font-size:12px;color:#9ca3af;">(업로드 순서: 주거1~3, 상업1~3, 공업1~3 권장)</span>
    <div id="stats"></div>
  </div>
  <canvas id="game" width="1800" height="1000"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const TILE_W = 96, TILE_H = 48;
    const MAP_W = 24, MAP_H = 24;
    const originX = canvas.width / 2;
    const originY = 130;

    const modeRoad = document.getElementById('modeRoad');
    const modeBuild = document.getElementById('modeBuild');
    const buildTypeSel = document.getElementById('buildType');
    const upgradeBtn = document.getElementById('upgradeBtn');
    const imgInput = document.getElementById('imgInput');
    const statsEl = document.getElementById('stats');

    let mode = 'build';
    let selected = null;

    const images = {
      residential: [null, null, null],
      commercial: [null, null, null],
      industrial: [null, null, null]
    };

    const grid = Array.from({ length: MAP_H }, () => Array.from({ length: MAP_W }, () => ({
      road: false,
      building: null,
      level: 0
    })));

    function isoToScreen(x, y) {
      return {
        x: originX + (x - y) * (TILE_W / 2),
        y: originY + (x + y) * (TILE_H / 2)
      };
    }

    function screenToIso(px, py) {
      const dx = px - originX;
      const dy = py - originY;
      const x = (dx / (TILE_W / 2) + dy / (TILE_H / 2)) / 2;
      const y = (dy / (TILE_H / 2) - dx / (TILE_W / 2)) / 2;
      return { x: Math.floor(x), y: Math.floor(y) };
    }

    function pointInDiamond(px, py, cx, cy) {
      const nx = Math.abs(px - cx) / (TILE_W / 2);
      const ny = Math.abs(py - cy) / (TILE_H / 2);
      return nx + ny <= 1;
    }

    function drawTile(i, j, fill = '#22c55e', stroke = '#15803d') {
      const p = isoToScreen(i, j);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + TILE_W / 2, p.y + TILE_H / 2);
      ctx.lineTo(p.x, p.y + TILE_H);
      ctx.lineTo(p.x - TILE_W / 2, p.y + TILE_H / 2);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = grid[y][x];
          let color = '#4ade80';
          if (cell.road) color = '#9ca3af';
          if (selected && selected.x === x && selected.y === y) color = '#fde047';
          drawTile(x, y, color, '#166534');

          if (cell.building) {
            const p = isoToScreen(x, y);
            const lvIdx = cell.level - 1;
            const img = images[cell.building][lvIdx];
            if (img) {
              ctx.drawImage(img, p.x - 42, p.y - 70, 84, 84);
            } else {
              ctx.fillStyle = cell.building === 'residential' ? '#3b82f6' : cell.building === 'commercial' ? '#a855f7' : '#f97316';
              ctx.fillRect(p.x - 18, p.y + 6, 36, 28);
            }
          }
        }
      }

      updateStats();
    }

    function updateStats() {
      let residential = 0, commercial = 0, industrial = 0, roads = 0;
      let economy = 0, pollution = 0, traffic = 0;
      for (const row of grid) {
        for (const c of row) {
          if (c.road) roads++;
          if (c.building === 'residential') { residential++; economy += c.level * 2; traffic += c.level; }
          if (c.building === 'commercial') { commercial++; economy += c.level * 4; traffic += c.level * 2; }
          if (c.building === 'industrial') { industrial++; economy += c.level * 3; pollution += c.level * 3; traffic += c.level * 2; }
        }
      }
      statsEl.textContent = `주거:${residential} 상업:${commercial} 공업:${industrial} 도로:${roads} | 경제:${economy} 공해:${pollution} 교통:${traffic}`;
    }

    function applyAction(x, y) {
      if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return;
      const cell = grid[y][x];
      selected = { x, y };

      if (mode === 'road') {
        cell.road = true;
        cell.building = null;
        cell.level = 0;
      } else {
        const type = buildTypeSel.value;
        cell.road = false;
        cell.building = type;
        if (cell.level === 0) cell.level = 1;
      }
      draw();
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const tile = screenToIso(px, py);
      if (tile.x < 0 || tile.y < 0 || tile.x >= MAP_W || tile.y >= MAP_H) return;

      const center = isoToScreen(tile.x, tile.y);
      if (!pointInDiamond(px, py, center.x, center.y + TILE_H / 2)) return;

      applyAction(tile.x, tile.y);
    });

    upgradeBtn.addEventListener('click', () => {
      if (!selected) return;
      const c = grid[selected.y][selected.x];
      if ((c.building === 'residential' || c.building === 'commercial') && c.level < 3) {
        c.level++;
      }
      draw();
    });

    modeRoad.onclick = () => { mode = 'road'; modeRoad.classList.add('active'); modeBuild.classList.remove('active'); };
    modeBuild.onclick = () => { mode = 'build'; modeBuild.classList.add('active'); modeRoad.classList.remove('active'); };

    imgInput.addEventListener('change', (e) => {
      const files = [...e.target.files];
      const order = ['residential', 'residential', 'residential', 'commercial', 'commercial', 'commercial', 'industrial', 'industrial', 'industrial'];
      files.slice(0, 9).forEach((file, idx) => {
        const type = order[idx];
        const lv = idx % 3;
        const img = new Image();
        img.onload = () => draw();
        img.src = URL.createObjectURL(file);
        images[type][lv] = img;
      });
      draw();
    });

    draw();
  </script>
</body>
</html>
